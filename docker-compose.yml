services:
  db:
    image: postgres:16-alpine
    container_name: threatscope-db
    environment:
      POSTGRES_USER: threatscope
      POSTGRES_PASSWORD: threatscope
      POSTGRES_DB: threatscope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: threatscope-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://threatscope:threatscope@db:5432/threatscope
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
